name: Oracle keeper (testnets)

# Pushes the live KAS price to both testnet oracles and liquidates unhealthy
# positions. GitHub cron has coarse timing (>=5 min, often delayed), so the
# testnet oracles/perps accept prices up to 30 minutes old — see README.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

concurrency:
  group: keeper
  cancel-in-progress: false

jobs:
  keeper:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      KEEPER_PRIVATE_KEY: ${{ secrets.KEEPER_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # Root deps provide ethers + dotenv; keeper resolves them from here.
      - run: npm ci --omit=dev
      # continue-on-error: a testnet having an off day should show a red step,
      # not fail the whole scheduled run every 10 minutes.
      - name: Push price — Kasplex zkEVM testnet
        continue-on-error: true
        run: KEEPER_ONCE=true KEEPER_NETWORK=kasplexTestnet node contracts/scripts/keeper.js
      - name: Push price — Igra Galleon testnet
        if: always() # one network failing must not starve the other
        continue-on-error: true
        run: KEEPER_ONCE=true KEEPER_NETWORK=igraGalleon node contracts/scripts/keeper.js
